services:
  - type: web
    name: pdf-gembot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: GEMINI_API_KEY
        value: your_gemini_api_key
      - key: DB_HOST
        value: your_mysql_host
      - key: DB_USER
        value: root
      - key: DB_PASSWORD
        value: ROOT
      - key: DB_NAME
        value: pdf_ai
      - key: DB_PORT
        value: 3306
